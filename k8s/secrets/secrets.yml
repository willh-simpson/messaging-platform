# ============================================================
# secrets.yml — Kubernetes Secret for all sensitive values
#
# IMPORTANT: Never commit real secret values to git.
# This file shows the structure only. Generate real values
# and apply them directly with kubectl, or use a secrets
# manager (AWS Secrets Manager, Vault) with External Secrets
# Operator to inject them at deployment time.
#
# HOW TO CREATE REAL SECRETS:
#
# Option A — kubectl from .env file (local/staging):
#   kubectl create secret generic messaging-secrets \
#     --from-literal=JWT_SECRET="$(openssl rand -base64 64)" \
#     --from-literal=DB_USERNAME="messaging_user" \
#     --from-literal=DB_PASSWORD="your-db-password" \
#     --from-literal=MONGO_USERNAME="messaging_user" \
#     --from-literal=MONGO_PASSWORD="your-mongo-password" \
#     --from-literal=RABBITMQ_USERNAME="messaging_user" \
#     --from-literal=RABBITMQ_PASSWORD="your-rabbitmq-password"
#
# Option B — from base64 values in this file (CI/CD):
#   base64-encode each value and paste below.
#   echo -n "your-value" | base64
#
# WHAT K8S DOES WITH THESE:
# Each key in the Secret is injected as an OS environment
# variable into every pod that references this Secret via
# envFrom.secretRef. The Spring Boot application reads
# ${JWT_SECRET} etc. via the same placeholder mechanism
# it uses locally — zero code changes between environments.
# ============================================================
apiVersion: v1
kind: Secret
metadata:
  name: messaging-secrets
  namespace: messaging
type: Opaque
data:
  # base64-encoded values — replace with real values
  # echo -n "your-value" | base64
  JWT_SECRET: REPLACE_WITH_BASE64_ENCODED_SECRET
  DB_USERNAME: bWVzc2FnaW5nX3VzZXI=       # messaging_user
  DB_PASSWORD: REPLACE_WITH_BASE64_ENCODED_PASSWORD
  MONGO_USERNAME: bWVzc2FnaW5nX3VzZXI=   # messaging_user
  MONGO_PASSWORD: REPLACE_WITH_BASE64_ENCODED_PASSWORD
  RABBITMQ_USERNAME: bWVzc2FnaW5nX3VzZXI= # messaging_user
  RABBITMQ_PASSWORD: REPLACE_WITH_BASE64_ENCODED_PASSWORD