apiVersion: apps/v1
kind: Deployment
metadata:
  name: rabbitmq
  namespace: messaging
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rabbitmq
  template:
    metadata:
      labels:
        app: rabbitmq
    spec:
      containers:
        - name: rabbitmq
          image: rabbitmq:3.13-management
          ports:
            - containerPort: 5672   # AMQP
            - containerPort: 15672  # management UI
            - containerPort: 61613  # STOMP
          env:
            - name: RABBITMQ_DEFAULT_USER
              valueFrom:
                secretKeyRef:
                  name: messaging-secrets
                  key: RABBITMQ_USERNAME
            - name: RABBITMQ_DEFAULT_PASS
              valueFrom:
                secretKeyRef:
                  name: messaging-secrets
                  key: RABBITMQ_PASSWORD
            - name: RABBITMQ_ENABLED_PLUGINS_FILE
              value: "/etc/rabbitmq/enabled_plugins"
          volumeMounts:
            - name: rabbitmq-plugins
              mountPath: /etc/rabbitmq/enabled_plugins
              subPath: enabled_plugins
          readinessProbe:
            exec:
              command: ["rabbitmq-diagnostics", "check_running"]
            initialDelaySeconds: 20
            periodSeconds: 10
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: rabbitmq-plugins
          configMap:
            name: rabbitmq-plugins-config
---
# enables the STOMP plugin
apiVersion: v1
kind: ConfigMap
metadata:
  name: rabbitmq-plugins-config
  namespace: messaging
data:
  enabled_plugins: "[rabbitmq_management,rabbitmq_stomp]."
---
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq-service
  namespace: messaging
spec:
  selector:
    app: rabbitmq
  ports:
    - name: amqp
      port: 5672
      targetPort: 5672
    - name: stomp
      port: 61613
      targetPort: 61613
    - name: management
      port: 15672
      targetPort: 15672