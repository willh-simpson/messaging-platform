apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: messaging-ingress
  namespace: messaging
  annotations:
    kubernetes.io/ingress.class: "nginx"
    # required for WebSocket connections
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
spec:
  # commented out while https is not set up, so TLS remains disabled
  # tls:
  #   - hosts:
  #       - api.messaging.example.com
  #     secretName: messaging-tls-secret
  rules:
    - host: api.messaging.local  # replace with domain in production
      http:
        paths:
          # message history: persistence-service
          - path: /api/channels
            pathType: Prefix
            backend:
              service:
                name: persistence-service-service
                port:
                  number: 8082
          # WebSocket: delivery-service
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: delivery-service-service
                port:
                  number: 8083
          # message publish: messaging-service
          - path: /api/messages
            pathType: Prefix
            backend:
              service:
                name: messaging-service-service
                port:
                  number: 8081
          # everything else: api-gateway
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-gateway-service
                port:
                  number: 8080